    <h2>Registro</h2>
    <input type="text" id="regUser" placeholder="Usuario"><br/>
    <input type="password" id="regPass" placeholder="Contraseña"><br/>
    <button onclick="register()">Registrar</button>

    <h2>Iniciar sessió</h2>
        <label for="Usuari">Usuari</label><br>
        <input type="text" id="usuari"><br>
        <label for="contrassenya">Contrassenya</label><br>
        <input type="password" id="contrassenya"><br>
        <button type="button" onclick="validarLogin()">Inicia sessió</button>

    <script>
        function register(){
        const user = document.getElementById("regUser").value;
        const pass = document.getElementById("regPass").value;

        //Comprobar campos vacíos
        if (user===""||pass===""){
        alert("Ompli tots els camps");
        return;
        }

        //Recuperar usuarios guardados
        let users = localStorage.getItem("users");
        users = users ? JSON.parse(users) : {};

        //Cpmprobar si existe el usuario
        if (users[user]){
        alert("L'usuari ja existeix");
        return;
        }

        //Guardar usuario
        users[user] = pass;
        localStorage.setItem("users", JSON.stringify(users));
        alert("S'ha creat l'usuari. Pots iniciar sessió");
      }
      function validarLogin(){
        const usuari = document.getElementById("usuari").value;
        const contrassenya = document.getElementById("contrassenya").value;

          if (usuari == ""){
            alert ("El camp d'usuari és obligatori")
            return;
          }
          if (contrassenya == ""){
            alert ("El camp contrassenya és obligatori")
            return;
          }
          
          let users = localStorage.getItem("users");
          users = users ? JSON.parse(users) : {};

          if (users[usuari] && users[usuari] === contrassenya) {
            alert ("Inici de sessió correcte");
            localStorage.setItem("usuarioiniciado", usuari);
            window.location.href = "principal.html"
          }else {
            alert("Usuario o contrassenya incorrectes");
          }    

    }
    </script>
